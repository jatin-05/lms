<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="page-shell">
<div class="container">

<header class="app-header">
  <div class="header-inner">
    <div class="app-brand">LMS Registration</div>
    <nav class="app-nav">
      <a href="login.html">Login</a>
      <a href="index.php">Courses</a>
    </nav>
  </div>
</header>

<section class="auth-shell">
  <div class="auth-panel">
    <h2>Create Your Account</h2>
    <p class="subheading">Choose your role and start building or learning with a modern LMS experience.</p>

    <form action="../backend/register.php" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" placeholder="Name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="Email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Password" required>
      </div>
      <div class="form-group">
        <label for="role">I am a</label>
        <select id="role" name="role">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn" type="submit">Register</button>
      </div>
    </form>

    <p class="form-note">Already registered? <a href="login.html">Login here</a></p>
  </div>
</section>
</div>
</div>

</body>
</html>
